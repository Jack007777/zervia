services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: zervia-api
    env_file:
      - ./apps/api/.env
    restart: unless-stopped
    expose:
      - "4000"
    networks:
      - zervia

  nginx:
    image: nginx:1.27-alpine
    container_name: zervia-nginx
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - zervia

networks:
  zervia:
    driver: bridge
